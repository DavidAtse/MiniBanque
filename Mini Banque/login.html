<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Banque - Inscription/Connexion</title>
    <link rel="stylesheet" href="/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>
    <div class="container">

        <!-- INSCRIPTION (gauche) -->
        <div class="panel">
            <div class="panel-label">Inscris toi pour gérer et suivre tes dépenses comme un pro</div>
            <h2>Créer un<br>compte</h2>

            <div class="field">
                <label for="reg-name">Username</label>
                <input id="reg-name" type="text" placeholder="Votre nom" autocomplete="name"/>
            </div>

            <div class="field">
                <label for="reg-pass">PIN</label>
                <input id="reg-pass" type="password" placeholder="Minimum 4 caractères">
            </div>

            <div class="field">
                <label for="date-naissance">Date de naissance</label>
                <input id="date-naissance" type="date"/>
            </div>

            <div class="check-group">
                <input type="checkbox" id="terms"/>
                <span>J'accepte les <a href="#">conditions d'utilisation</a></span>
            </div>

            <button id="registerBtn">S'inscrire</button>
            <p id="message"></p>
        </div>

        <div class="divider"></div>

        <!-- CONNEXION (droite) -->
        <div class="panel">
            <div class="panel-label">Déjà membre ? Connecte toi pour gerer tes finances comme un Pro</div>
            <h2>Se<br>connecter</h2>

            <div class="field">
                <label for="log-name">Username</label>
                <input id="log-name" type="text" placeholder="Votre nom" autocomplete="name"/>
            </div>

            <div class="field">
                <label for="log-pass">PIN</label>
                <input id="log-pass" type="password" placeholder="Minimum 4 caractères" />
            </div>

            <button id="loginBtn" style="margin-top: 28px;">Se connecter</button>
            <p id="message2"></p>

            <p class="sub-link"><a href="#">Mot de passe oublié ?</a></p>
        </div>

    </div>

    <script src="js/auth.js"></script>
</body>
</html>
